name: Build o1s Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - rebased-11
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget tar xz-utils zip unzip \
            build-essential bc bison flex \
            libssl-dev libelf-dev pahole \
            python3 python3-pip \
            cpio lz4 kmod rsync ca-certificates

      - name: Prepare dtconfigs
        run: |
          mkdir -p build/dtconfigs
          cp -af dt.configs/*.cfg build/dtconfigs/
          
      - name: Clone mkbootimg
        run: |
         mkdir -p toolchain
         rm -rf toolchain/mkbootimg
         git clone https://android.googlesource.com/platform/system/tools/mkbootimg toolchain/mkbootimg
         
      - name: Cache clang toolchain
        uses: actions/cache@v4
        with:
          path: toolchain/clang-r596125
          key: clang-r596125-v1   
          
      - name: Build kernel
        run: |
          bash build.sh -m o1s -k y -s y -r n 2>&1 | tee build.log

      - name: Show outputs
        run: |
          find build/out/o1s -maxdepth 2 -type f | sort || true
          
      - name: Show real errors
        if: always()
        run: |
          echo "===== ERROR LINES ====="
          grep -i -n "error:\|fatal error:\|undefined reference\|No such file\|ld.lld:\|FAILED" build.log | head -100 || true
          echo "===== LAST 200 LINES ====="
          tail -200 build.log || true
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o1s-kernel-build
          path: |
            build/out/o1s/Image
            build/out/o1s/*.zip
            build/out/o1s/*.img
          if-no-files-found: warn
