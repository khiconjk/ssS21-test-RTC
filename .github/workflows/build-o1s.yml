name: Build o1s Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget tar xz-utils zip unzip \
            build-essential bc bison flex \
            libssl-dev libelf-dev pahole \
            python3 python3-pip \
            cpio lz4 gzip kmod rsync ca-certificates

      - name: Prepare submodules manually
        run: |
          rm -rf KernelSU-Next
          rm -rf clang
          rm -rf toolchain/mkbootimg
          rm -rf toolchain/libufdt

          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg toolchain/mkbootimg
          git clone --depth=1 https://android.googlesource.com/platform/system/libufdt toolchain/libufdt

          cp -f toolchain/libufdt/utils/src/mkdtimg.py toolchain/mkdtimg
          chmod +x toolchain/mkdtimg

      - name: Cache clang
        uses: actions/cache@v5
        with:
          path: toolchain/clang-r596125
          key: clang-r596125-linux-x86-v3

      - name: Setup clang
        run: |
          if [ ! -x "toolchain/clang-r596125/bin/clang" ]; then
            rm -rf toolchain/clang-r596125
            rm -f toolchain/clang.tar.gz

            mkdir -p toolchain/clang-r596125

            wget -O toolchain/clang.tar.gz \
              "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r596125.tar.gz"

            tar -xf toolchain/clang.tar.gz -C toolchain/clang-r596125
          fi

          toolchain/clang-r596125/bin/clang --version

      - name: Patch build.sh
        run: |
          chmod +x build.sh

          sed -i 's#wget "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r596125.tar.gz"#wget -O clang.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r596125.tar.gz"#g' build.sh

          sed -i 's#mkdir clang-r596125#rm -rf clang-r596125\nmkdir -p clang-r596125#g' build.sh

          sed -i 's#> ../$MODEl/vendor_ramdisk#> ../vendor_ramdisk#g' build.sh

      - name: Prepare dtconfigs
        run: |
          mkdir -p build/dtconfigs
          cp -af dt.configs/*.cfg build/dtconfigs/

      - name: Build o1s kernel
        run: |
          bash build.sh -m o1s -k y -s y -r n 2>&1 | tee build.log

      - name: Show outputs
        if: always()
        run: |
          echo "===== OUTPUT FILES ====="
          find build/out/o1s -type f | sort || true

          echo "===== ERROR LINES ====="
          grep -i -n "error:\|fatal error:\|undefined reference\|No such file\|ld.lld:\|FAILED\|abort\|cannot stat" build.log | head -200 || true

          echo "===== LAST 200 LINES ====="
          tail -200 build.log || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: o1s-kernel-build
          path: |
            build.log
            build/out/o1s/Image
            build/out/o1s/*.img
            build/out/o1s/*.zip
          if-no-files-found: warn
