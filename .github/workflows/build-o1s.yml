name: Build Tissot TWRP Kernel GCC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: thirteen
          fetch-depth: 1

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison flex zip unzip curl make python3 \
            libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi

      - name: Build kernel GCC
        run: |
          set -euo pipefail

          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions

          echo "===== REMOVE WERROR FROM SOURCE ====="
          find . \
            -path './.git' -prune -o \
            -path './out' -prune -o \
            -type f \
            \( -name 'Makefile' -o -name 'Kbuild' -o -name '*.mk' -o -name '*.c' -o -name '*.h' \) \
            -print0 | xargs -0 sed -i \
              -e 's/-Werror=[A-Za-z0-9_-]*//g' \
              -e 's/-Werror//g'

          echo "===== DEFCONFIG ====="
          make O=out ARCH=arm64 msm8953-perf_defconfig

          echo "===== FIX CONFIG ====="
          scripts/config --file out/.config -d CONFIG_CC_STACKPROTECTOR_STRONG || true
          scripts/config --file out/.config -e CONFIG_CC_STACKPROTECTOR || true
          scripts/config --file out/.config -d CONFIG_WERROR || true
          scripts/config --file out/.config -d CONFIG_ENABLE_WARN_DEPRECATED || true

          make O=out ARCH=arm64 olddefconfig

          echo "===== BUILD GCC NO WERROR ====="
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-Wno-error -Wno-error=date-time -Wno-error=unused-function -Wno-error=unused-variable -Wno-error=unused-label -Wno-error=maybe-uninitialized -Wno-error=implicit-fallthrough" \
            KCPPFLAGS="-Wno-error" \
            Image.gz 2>&1 | tee build.log

          echo "===== OUTPUT ====="
          find out/arch/arm64/boot -type f -exec ls -lh {} \;

          echo "===== PICK KERNEL ====="
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb kernel-output
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz kernel-output
          elif [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image kernel-output
          else
            echo "ERROR: No kernel image found"
            exit 1
          fi

          ls -lh kernel-output

      - name: Pack AnyKernel3 TWRP zip
        run: |
          set -euo pipefail

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3

          rm -rf .git README.md LICENSE

          cp ../kernel-output ./Image.gz

          cat > anykernel.sh <<'EOF'
          properties() { '
          kernel.string=Tissot Kernel
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=tissot
          device.name2=Mi A1
          '; }

          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=auto;
          ramdisk_compression=auto;

          . tools/ak3-core.sh;

          split_boot;
          flash_boot;
          EOF

          zip -r9 ../Tissot-Kernel-TWRP.zip . -x '*.git*'
          cd ..

          ls -lh Tissot-Kernel-TWRP.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Tissot-Kernel
          path: |
            Tissot-Kernel-TWRP.zip
            kernel-output
            build.log
